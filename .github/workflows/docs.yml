name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Push-triggered deploys begin automatically once the repository is public.
    # A maintainer can still test/deploy manually while it is private if their
    # GitHub plan supports private Pages.
    if: github.event_name == 'workflow_dispatch' || github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - run: python -m pip install --require-hashes -r docs/requirements.txt
      - run: mkdocs build --strict --site-dir site/docs
        working-directory: docs
      - name: Add marketing landing page
        run: cp -R docs/landing/. docs/site/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
