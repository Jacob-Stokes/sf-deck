name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "docs-site/**"
      - ".github/workflows/docs.yml"

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Push-triggered deploys begin automatically once the repository is public.
    # A maintainer can still test/deploy manually while it is private if their
    # GitHub plan supports private Pages.
    if: github.event_name == 'workflow_dispatch' || github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13.11"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt
      - run: python -m pip install --require-hashes -r docs-site/requirements.txt
      - run: mkdocs build --strict --site-dir site/docs
        working-directory: docs-site
      - name: Add marketing landing page
        run: cp -R landing/. docs-site/site/
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs-site/site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
